<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Empire OS"/>

<title>Empire OS</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:'Montserrat',sans-serif;background:#1a1710;color:#2a2620;}
:root{
  --bg:#eeeae3;--surface:#f4f0e8;--card:#f9f6f0;
  --dark:#1a1710;
  --text:#2a2620;--gold:#b8952a;--goldLight:#d4af5a;
  --border:rgba(160,135,80,0.18);--borderHi:rgba(160,135,80,0.35);
  --muted:rgba(42,38,32,0.5);--muted2:rgba(42,38,32,0.28);
}
input,textarea,select,button{font-family:'Montserrat',sans-serif;outline:none;border:none;}
button{cursor:pointer;background:none;}
textarea{resize:none;}
.serif{font-family:'Cormorant Garamond',serif;}
::-webkit-scrollbar{width:0;height:0;}
#app{max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;background:var(--bg);position:relative;}
#tasks-header{flex-shrink:0;position:relative;z-index:50;}
.hero{position:relative;height:150px;overflow:hidden;}
.hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.hero-ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.1) 0%,rgba(0,0,0,0.6) 100%);}
.hero-content{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:space-between;padding:14px 16px;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:#fff;letter-spacing:0.04em;line-height:1;}
.hero-title em{font-style:italic;color:var(--goldLight);}
.hero-date{font-size:8px;font-weight:700;letter-spacing:0.2em;color:rgba(255,255,255,0.6);text-transform:uppercase;margin-top:5px;}
.hero-add{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.35);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;cursor:pointer;flex-shrink:0;}
.gold-bar{height:2px;background:linear-gradient(90deg,transparent,#b8952a,#f0d47a,#d4af5a,transparent);}
/* TWO-ROW PILLAR TABS */
#pillar-tabs{background:var(--dark);padding:8px 8px 10px;display:flex;flex-direction:column;gap:5px;}
.prow{display:grid;gap:5px;}
.prow-5{grid-template-columns:repeat(5,1fr);}
.prow-4{grid-template-columns:repeat(4,1fr);}
.ptab{padding:7px 3px 6px;border-radius:10px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;background:rgba(255,255,255,0.07);border:1px solid transparent;transition:all 0.15s;}
.ptab.active{background:rgba(212,175,90,0.18);border-color:rgba(212,175,90,0.32);}
.ptab-icon{font-size:15px;line-height:1;}
.ptab-label{font-size:7px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:rgba(255,255,255,0.5);}
.ptab.active .ptab-label{color:var(--goldLight);}
/* SCROLL AREA */
#main-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 110px;background:var(--bg);min-height:50vh;}
/* BOTTOM NAV */
#bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--dark);display:flex;border-top:1px solid rgba(212,175,90,0.18);z-index:100;padding-bottom:env(safe-area-inset-bottom,0px);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;gap:3px;cursor:pointer;}
.nav-icon{font-size:18px;line-height:1;}
.nav-label{font-size:8px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.35);}
.nav-item.active .nav-label{color:var(--goldLight);}
.nav-agent-wrap{flex:1;display:flex;flex-direction:column;align-items:center;padding-bottom:6px;cursor:pointer;}
.nav-agent-btn{width:46px;height:46px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:21px;margin-top:-14px;box-shadow:0 4px 18px rgba(184,149,42,0.45);transition:background 0.2s;}
.nav-agent-btn.open{background:var(--goldLight);}
.nav-agent-lbl{font-size:8px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-top:2px;}
/* STATS */
.stats-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:15px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.stat-grp{display:flex;gap:16px;align-items:center;}
.stat-item{text-align:center;}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:400;color:var(--text);line-height:1;}
.stat-lbl{font-size:8px;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;margin-top:1px;}
.stat-div{width:1px;height:32px;background:var(--border);}
.stat-quote{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:var(--muted);text-align:right;max-width:110px;line-height:1.4;}
/* FOCUS */
.focus-card{background:linear-gradient(135deg,rgba(184,149,42,0.1),rgba(184,149,42,0.05));border:1px solid rgba(184,149,42,0.22);border-radius:16px;padding:13px 15px;margin-bottom:14px;}
.focus-title{font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);margin-bottom:9px;}
.focus-item{display:flex;align-items:center;gap:8px;padding:5px 0;}
.focus-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.focus-text{font-size:12px;font-weight:500;flex:1;color:var(--text);}
.focus-time{font-size:10px;color:var(--muted);}
/* SECTION LABEL */
.slbl{font-size:9px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px;margin:16px 0 8px;}
.slbl::after{content:'';flex:1;height:1px;background:rgba(160,135,80,0.14);}
/* TASK CARD */
.task-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:11px 12px 11px 16px;margin-bottom:7px;position:relative;overflow:hidden;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:opacity 0.25s;}
.task-card.done{opacity:0.45;}
.task-accent{position:absolute;left:0;top:0;bottom:0;width:4px;}
.task-check{width:20px;height:20px;border-radius:50%;border:1.5px solid;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;margin-top:1px;transition:all 0.2s;}
.task-body{flex:1;min-width:0;}
.task-text{font-size:13px;font-weight:500;line-height:1.4;color:var(--text);}
.task-text.strike{text-decoration:line-through;color:var(--muted);}
.task-meta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap;}
.task-time{font-size:10px;color:var(--muted);}
.pill{font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:2px 7px;border-radius:4px;}
.task-pri{margin-left:auto;font-size:13px;}
.task-del{font-size:15px;color:var(--muted2);cursor:pointer;padding:2px 4px;flex-shrink:0;align-self:center;}
/* PILLAR HERO */
.pillar-hero{border-radius:16px;overflow:hidden;margin-bottom:12px;position:relative;height:95px;}
.pillar-hero img{width:100%;height:100%;object-fit:cover;}
.pillar-hero-ov{position:absolute;inset:0;display:flex;align-items:flex-end;padding:12px 14px;background:linear-gradient(180deg,rgba(0,0,0,0),rgba(0,0,0,0.68));}
.tiktok-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.tiktok-card{border-radius:14px;overflow:hidden;position:relative;height:78px;}
.tiktok-card img{width:100%;height:100%;object-fit:cover;}
.tiktok-ov{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;background:linear-gradient(180deg,rgba(0,0,0,0),rgba(0,0,0,0.72));}
.pillar-sec-hdr{display:flex;align-items:center;justify-content:space-between;margin:6px 0 8px;}
.pillar-sec-lbl{font-size:9px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;display:flex;align-items:center;gap:6px;}
.p-add{width:26px;height:26px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;}
/* BANNERS */
.sec-banner{border-radius:16px;overflow:hidden;margin-bottom:14px;position:relative;height:88px;}
.sec-banner img{width:100%;height:100%;object-fit:cover;}
.sec-banner-ov{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:12px 14px;background:linear-gradient(180deg,rgba(0,0,0,0),rgba(0,0,0,0.65));}
/* IDEA CARD */
.idea-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:11px 12px 11px 16px;margin-bottom:7px;position:relative;overflow:hidden;}
.idea-status{font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:2px 8px;border-radius:20px;border:1px solid;}
.idea-status.concept{background:rgba(160,135,80,0.1);color:#8a7a3a;border-color:rgba(160,135,80,0.25);}
.idea-status.inprogress{background:rgba(74,153,128,0.1);color:#4a9980;border-color:rgba(74,153,128,0.25);}
.idea-status.live{background:rgba(184,149,42,0.15);color:var(--gold);border-color:rgba(184,149,42,0.3);}
.idea-notes{font-size:11px;color:var(--muted);line-height:1.4;margin-top:5px;font-style:italic;}
.idea-expand{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;margin-top:8px;}
.idea-expand textarea{width:100%;background:transparent;border:none;font-size:12px;color:var(--text);line-height:1.4;resize:none;min-height:50px;}
.wins-card{background:linear-gradient(135deg,rgba(184,149,42,0.12),rgba(184,149,42,0.05));border:1px solid rgba(184,149,42,0.3);border-radius:15px;padding:15px;margin-bottom:11px;position:relative;overflow:hidden;}
/* GOALS */
.goal-card{background:var(--card);border:1px solid var(--border);border-radius:15px;padding:15px;margin-bottom:11px;position:relative;overflow:hidden;}
.goal-bar-bg{position:absolute;top:0;left:0;right:0;height:3px;background:rgba(0,0,0,0.07);}
.goal-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--goldLight));transition:width 0.4s;}
.ms-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.ms-row:last-of-type{border-bottom:none;}
.ms-check{width:17px;height:17px;border-radius:50%;border:2px solid;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;}
/* FILTER PILLS */
.filter-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.fpill{padding:6px 10px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);}
.fpill.active{background:rgba(184,149,42,0.1);border-color:var(--gold);color:var(--gold);}
/* MODAL */
.modal-bg{position:fixed;inset:0;z-index:300;display:flex;align-items:flex-end;justify-content:center;}
.modal-ov{position:absolute;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(5px);}
.modal-sheet{position:relative;z-index:1;width:100%;max-width:430px;background:var(--surface);border-radius:26px 26px 0 0;padding:26px 20px 42px;max-height:88vh;overflow-y:auto;}
.modal-close{position:absolute;top:14px;right:16px;font-size:20px;color:var(--muted);cursor:pointer;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:var(--text);margin-bottom:18px;}
.flabel{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px;}
.finput{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--text);}
.finput:focus{border-color:var(--goldLight);}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.oBtn{padding:9px 4px;border-radius:9px;text-align:center;border:1.5px solid var(--border);cursor:pointer;font-size:10px;font-weight:600;background:var(--card);color:var(--text);}
.oBtn.sel{background:rgba(184,149,42,0.1);border-color:var(--gold);color:var(--gold);}
.ropts{display:flex;gap:7px;}
.ropts .oBtn{flex:1;font-size:11px;}
.btn-dark{background:var(--dark);color:#fff;border:1px solid rgba(212,175,90,0.28);padding:14px;border-radius:14px;font-size:13px;font-weight:600;letter-spacing:0.1em;cursor:pointer;width:100%;margin-top:6px;}
.add-goal-btn{width:100%;padding:13px;border-radius:13px;border:1.5px dashed rgba(184,149,42,0.28);background:transparent;color:var(--gold);font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;margin-top:6px;}
/* AGENT */
#agent-panel{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:200;padding-bottom:env(safe-area-inset-bottom,0px);}
.agent-inner{background:#1a1710;border-radius:20px 20px 0 0;border-top:1px solid rgba(212,175,90,0.18);overflow:hidden;}
.agent-hdr{padding:13px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.06);cursor:pointer;}
.agent-dot{width:7px;height:7px;border-radius:50%;background:#d4af5a;}
.agent-title-txt{font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:#d4af5a;}
.agent-hint{font-size:9px;color:rgba(255,255,255,0.3);margin-left:auto;}
.agent-msgs{background:#131109;padding:10px 14px;max-height:230px;overflow-y:auto;}
.amsg{max-width:86%;padding:9px 12px;border-radius:12px;font-size:12px;line-height:1.55;margin-bottom:7px;}
.amsg.from-agent{background:rgba(212,175,90,0.09);border:1px solid rgba(212,175,90,0.14);color:rgba(255,255,255,0.82);}
.amsg.from-user{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.65);margin-left:auto;}
.amsg-lbl{font-size:8px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.28);margin-bottom:4px;}
.agent-input-row{display:flex;gap:8px;align-items:flex-end;background:#131109;padding:8px 14px 14px;}
.agent-ta{flex:1;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px 12px;font-size:12px;color:#fff;line-height:1.4;max-height:80px;}
.agent-send{width:38px;height:38px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;cursor:pointer;color:#fff;border:none;}
.empty-state{text-align:center;padding:36px 20px;color:var(--muted);font-size:12px;font-style:italic;}
.hidden{display:none!important;}
</style>
</head>

function initApp(){
  const now=new Date();
  const days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const mos=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const ds=document.getElementById('date-str');
  if(ds) ds.textContent=`${days[now.getDay()]}, ${mos[now.getMonth()]} ${now.getDate()}`;
  const qs=document.getElementById('quote-str');
  if(qs) qs.textContent=`"${QUOTES[now.getDay()%QUOTES.length]}"`;
  buildTabs();buildPillarOpts();renderAgentMsgs();setView('tasks');
}
window.addEventListener('DOMContentLoaded',()=>{
  initApp();
});
// Also try immediately
try{if(document.readyState!=='loading'){initApp();}}catch(e){}
// Load images after app renders  
setTimeout(function(){
  try{loadImages();}catch(e){console.log('img:',e);}
  try{renderTasks();}catch(e){console.log('rt:',e);}
},100);
// Hard fallback
setTimeout(function(){
  var vt=document.getElementById('view-tasks');
  var th=document.getElementById('tasks-header');
  if(vt&&vt.classList.contains('hidden')){
    vt.classList.remove('hidden');
    if(th) th.classList.remove('hidden');
    try{buildTabs();renderTasks();}catch(e){}
  }
},800);
// VIEWS
function setView(v){
  view=v;
  ['tasks','ideas','goals'].forEach(n=>{
    document.getElementById(`view-${n}`).style.display=(n===v?'block':'none');
    const ni=document.getElementById(`nav-${n}`);
    if(ni)ni.classList.toggle('active',n===v);
  });
  document.getElementById('tasks-header').style.display=(v==='tasks'?'':'none');
  if(v==='tasks')renderTasks();
  if(v==='ideas')renderIdeas();
  if(v==='goals')renderGoals();
}
// PILLAR TABS
function buildTabs(){
  const c=document.getElementById('pillar-tabs');
  function row(items,cls){
    const d=document.createElement('div');
    d.className=`prow ${cls}`;
    items.forEach(([p,emoji,lbl])=>{
      const el=document.createElement('div');
      el.className=`ptab${p===tab?' active':''}`;
      el.innerHTML=`<span class="ptab-icon">${emoji}</span><span class="ptab-label">${lbl}</span>`;
      el.onclick=()=>{tab=p;buildTabs();renderTasks();};
      d.appendChild(el);
    });
    return d;
  }
  c.innerHTML='';
  c.appendChild(row(TAB_ROW1,'prow-5'));
  c.appendChild(row(TAB_ROW2,'prow-4'));
}
// RENDER TASKS
function renderTasks(){
  sv("eos_tasks",tasks);
  document.getElementById('stat-total').textContent=tasks.length;
  document.getElementById('stat-done').textContent=tasks.filter(t=>t.done).length;
  document.getElementById('stat-urgent').textContent=tasks.filter(t=>!t.done&&t.pri==="high").length;
  if(tab==='all'){
    document.getElementById('tab-all').classList.remove('hidden');
    document.getElementById('tab-pillar').classList.add('hidden');
    renderAllTab();
  }else{
    document.getElementById('tab-all').classList.add('hidden');
    document.getElementById('tab-pillar').classList.remove('hidden');
    renderPillarTab();
  }
}
function renderAllTab(){
  const c=document.getElementById('tab-all');
  const topU=tasks.filter(t=>!t.done&&t.pri==="high").slice(0,3);
  const todayT=tasks.filter(t=>!t.done&&(!t.date||t.date===TODAY)).sort(tsort);
  const tomT=tasks.filter(t=>!t.done&&t.date===TOMORROW).sort(tsort);
  const weekT=tasks.filter(t=>!t.done&&t.date&&t.date!==TODAY&&t.date!==TOMORROW&&new Date(t.date)>new Date()).sort(tsort);
  const doneT=tasks.filter(t=>t.done);
  let h='';
  if(topU.length){
    h+=`<div class="focus-card"><div class="focus-title">⚡ TODAY'S FOCUS</div>`;
    topU.forEach(t=>{h+=`<div class="focus-item"><div class="focus-dot" style="background:${PILLARS[t.p]?.color||'#888'}"></div><div class="focus-text">${t.text}</div><div class="focus-time">${fmtTime(t.time)}</div></div>`;});
    h+=`</div>`;
  }
  if(todayT.length){h+=`<div class="slbl">⚡ TODAY</div>`;todayT.forEach(t=>{h+=tHTML(t);});}
  if(tomT.length){h+=`<div class="slbl">📅 TOMORROW</div>`;tomT.forEach(t=>{h+=tHTML(t);});}
  if(weekT.length){h+=`<div class="slbl">📅 THIS WEEK</div>`;weekT.forEach(t=>{h+=tHTML(t);});}
  if(doneT.length){h+=`<div class="slbl">✓ COMPLETED</div>`;doneT.forEach(t=>{h+=tHTML(t);});}

function tHTML(t){
  const p=PILLARS[t.p];const color=p?.color||'#888';const lbl=p?.label||t.p;
  return `<div class="task-card${t.done?' done':''}" onclick="toggleTask('${t.id}')">

      </div>

  </div>`;
}

  const text=document.getElementById('nt-text').value.trim();if(!text)return;

h+=`<div class="wins-card"> <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;"> <div style="font-size:20px;">🏆</div> <div class="serif" style="font-size:17px;font-weight:500;flex:1;">${g.title}</div> <div style="font-size:9px;font-weight:700;background:rgba(184,149,42,0.2);color:var(--gold);padding:3px 8px;border-radius:6px;">100%</div> </div> <div style="font-size:12px;color:var(--muted);line-height:1.4;margin-bottom:8px;">${g.desc}</div> <div style="font-size:10px;color:var(--gold);font-weight:600;">All ${g.milestones.length} milestones complete ✓</div> <button onclick="delGoal('${g.id}')" style="margin-top:10px;padding:6px 12px;border-radius:8px;border:1px solid rgba(200,80,80,0.18);background:rgba(200,80,80,0.05);font-size:11px;color:#c05050;cursor:pointer;">Archive</button> </div>`;
});
}
if(!goals.length)h=`<div class="empty-state">No goals yet. Add your first one below.</div>`;
c.innerHTML=h;
}
function isGoalComplete(g){return g.milestones.length>0&&g.milestones.every(m=>m.done);}
function goalCardHTML(g){
const done=g.milestones.filter(m=>m.done).length;
const pct=g.milestones.length?Math.round(done/g.milestones.length*100):0;
// Only show incomplete milestones prominently, done ones collapse
const incomplete=g.milestones.filter(m=>!m.done);
const completed=g.milestones.filter(m=>m.done);
return`<div class="goal-card"> <div class="goal-bar-bg"><div class="goal-bar-fill" style="width:${pct}%;background:${pct===100?'#4a9980':''};"></div></div> <div style="display:flex;align-items:flex-start;gap:9px;margin:4px 0 5px;"> <div class="serif" style="font-size:18px;font-weight:500;flex:1;line-height:1.2;">${g.title}</div> <div style="font-size:9px;font-weight:700;background:rgba(184,149,42,0.1);color:var(--gold);padding:3px 8px;border-radius:6px;flex-shrink:0;">${pct}%</div> </div> <div style="font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:8px;">${g.desc}</div> <div style="font-size:10px;color:var(--muted);margin-bottom:8px;">${done} of ${g.milestones.length} milestones</div> ${incomplete.map(m=>`<div class="ms-row" onclick="toggleMs('${g.id}','${m.id}')">
<div class="ms-check" style="border-color:var(--muted2);background:transparent;color:transparent;">✓</div>
<div style="font-size:12px;flex:1;color:var(--text);">${m.text}</div>
<button onclick="msToTask(event,'${g.id}','${m.id}')" style="font-size:9px;background:rgba(184,149,42,0.09);color:var(--gold);border:1px solid rgba(184,149,42,0.18);border-radius:6px;padding:3px 8px;cursor:pointer;">→ Task</button>
</div>`).join('')} ${completed.length?`<div style="font-size:10px;color:var(--muted);margin-top:6px;padding:6px 0;border-top:1px solid var(--border);">✓ ${completed.length} completed milestone${completed.length>1?‘s’:’’}</div>`:''} <div style="display:flex;gap:7px;margin-top:11px;"> <button onclick="addMs('${g.id}')" style="flex:1;padding:8px;border-radius:9px;border:1px solid var(--border);background:var(--card);font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;">+ Milestone</button> <button onclick="delGoal('${g.id}')" style="padding:8px 13px;border-radius:9px;border:1px solid rgba(200,80,80,0.18);background:rgba(200,80,80,0.05);font-size:11px;color:#c05050;cursor:pointer;">Delete</button> </div></div>`;
}
function toggleMs(gid,mid){
goals=goals.map(g=>g.id===gid?{…g,milestones:g.milestones.map(m=>m.id===mid?{…m,done:!m.done}:m)}:g);
sv(“eos_goals”,goals);
// Check if goal just became complete
const g=goals.find(g=>g.id===gid);
if(g&&isGoalComplete(g)){
setTimeout(()=>renderGoals(),400); // slight delay so user sees the last check
} else {
renderGoals();
}
}
function msToTask(e,gid,mid){e.stopPropagation();const g=goals.find(g=>g.id===gid);const m=g?.milestones.find(m=>m.id===mid);if(m){tasks=[…tasks,{id:uid(),text:m.text,p:“personal”,time:””,pri:“medium”,done:false,date:TODAY}];sv(“eos_tasks”,tasks);}}
function addMs(gid){const t=prompt(“New milestone:”);if(t){goals=goals.map(g=>g.id===gid?{…g,milestones:[…g.milestones,{id:uid(),text:t,done:false}]}:g);sv(“eos_goals”,goals);renderGoals();}}
function delGoal(gid){goals=goals.filter(g=>g.id!==gid);sv(“eos_goals”,goals);renderGoals();}
function openGoalModal(){ngState={title:””,desc:””,type:“immediate”,ms:””};[‘ng-title’,‘ng-desc’,‘ng-ms’].forEach(id=>document.getElementById(id).value=’’);document.getElementById(‘goal-modal’).style.display=‘flex’;}
function closeGoalModal(){document.getElementById(‘goal-modal’).style.display=‘none’;}
function saveGoal(){const title=document.getElementById(‘ng-title’).value.trim();if(!title)return;const desc=document.getElementById(‘ng-desc’).value.trim();const ms=document.getElementById(‘ng-ms’).value.trim();goals=[…goals,{id:uid(),type:ngState.type,title,desc,milestones:ms?[{id:uid(),text:ms,done:false}]:[]}];sv(“eos_goals”,goals);closeGoalModal();renderGoals();}
// ── AGENT ──────────────────────────────────────────────────
// Paste your Anthropic API key between the quotes below
const AGENT_KEY=””;
function toggleAgent(){agentOpen=!agentOpen;document.getElementById(‘agent-panel’).style.display=(agentOpen?‘block’:‘none’);document.getElementById(‘agent-orb’).classList.toggle(‘open’,agentOpen);if(agentOpen)renderAgentMsgs();}
function renderAgentMsgs(){const c=document.getElementById(‘agent-msgs’);c.innerHTML=agentMsgs.map(m=>`<div class="amsg ${m.role==='agent'?'from-agent':'from-user'}"><div class="amsg-lbl">${m.role==='agent'?'EMPIRE AGENT':'YOU'}</div>${m.text}</div>`).join(’’);c.scrollTop=c.scrollHeight;}
async function sendAgent(){
const input=document.getElementById(‘agent-input’);
const msg=input.value.trim();if(!msg)return;
input.value=’’;
agentMsgs=[…agentMsgs,{role:‘user’,text:msg},{role:‘agent’,text:‘Thinking…’}];
renderAgentMsgs();
const summary=tasks.slice(0,20).map(t=>`[${t.p}] "${t.text}" | ${t.pri} | ${t.done?"done":"pending"}`).join(’\n’);
const sys=`You are Queen’s Empire Agent. She runs:

- Jewel London Rocks (jewellondonrocks.com) — luxury crystal jewelry
- JLR Crystals (jlrcrystals.com) — B2B luxury crystal curation
- Crystal Code (thecrystalcode.com) — $47 digital wellness portal
- TikTok @sidjaeaura (lifestyle/founder) + @sidjaecurates (affiliate curation)
- Substack — standalone writing brand, raw & editorial voice
- Instagram — luxury lifestyle
- Apparel — streetwear line in development
- Personal — life & wellness
  Current tasks:\n${summary}
  Respond ONLY as JSON (no markdown, no backticks): {“message”:”…”,“action”:“add”|“none”,“task”:{“text”:””,“p”:“jewel|crystals|code|tiktok|instagram|substack|personal|apparel”,“pri”:“high|medium|low”,“time”:””,“date”:“today”}}
  Be warm, strategic, direct. Address her as Queen. Keep message under 3 sentences. If she asks you to add a task, set action to “add”.`;
  try{
  const res=await fetch(“https://api.anthropic.com/v1/messages”,{method:“POST”,headers:{“Content-Type”:“application/json”,“x-api-key”:AGENT_KEY,“anthropic-version”:“2023-06-01”},body:JSON.stringify({model:“claude-sonnet-4-20250514”,max_tokens:400,system:sys,messages:[{role:“user”,content:msg}]})});
  const data=await res.json();
  const raw=(data.content?.find(b=>b.type===“text”)?.text)||””;
  let parsed;try{parsed=JSON.parse(raw.replace(/`json|`/g,””).trim());}catch(e){parsed={message:raw||“Done.”,action:“none”};}
  agentMsgs[agentMsgs.length-1]={role:‘agent’,text:parsed.message||“Done.”};
  if(parsed.action===“add”&&parsed.task?.text){tasks=[…tasks,{id:uid(),…parsed.task,done:false,date:TODAY}];sv(“eos_tasks”,tasks);if(view===‘tasks’)renderTasks();}
  }catch(e){
  agentMsgs[agentMsgs.length-1]={role:‘agent’,text:“To activate me fully, open this file in a text editor and replace YOUR_ANTHROPIC_API_KEY_HERE with your real API key. Once that’s done I’m live, Queen! 👑”};
  }
  renderAgentMsgs();
  }
